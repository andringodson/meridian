# Automatic preview-image resolution audit. Probes every tab's feed on the
# live deployment and fails when a source/CDN starts serving low-res or
# broken thumbnails — daily, on demand, and whenever the API code changes.
name: image-check

on:
  schedule:
    - cron: '17 6 * * *' # daily, 06:17 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'scripts/check-images.mjs'
      - '.github/workflows/image-check.yml'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Zero dependencies — no npm install needed.
      - run: node scripts/check-images.mjs
