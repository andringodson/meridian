<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Meridian — Real-Time Intelligence</title>
  <meta name="description" content="Real-time world news, history and market intelligence, aggregated from open sources and updated automatically." />
  <meta name="theme-color" content="#000000" />

  <link rel="canonical" href="https://meridian-andrin.vercel.app/" />
  <meta property="og:title" content="Meridian — Real-Time Intelligence" />
  <meta property="og:description" content="Real-time world news, history and market intelligence from open sources." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Meridian" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Meridian — Real-Time Intelligence" />
  <meta name="twitter:description" content="Real-time world news, history and market intelligence from open sources." />
  <meta name="author" content="Andrin Godson" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Meridian" />

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/logo.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icons/icon.svg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <canvas id="fx" aria-hidden="true"></canvas>
  <div class="progress" id="progress" aria-hidden="true"></div>
  <a class="skip" href="#main">Skip to content</a>

  <header class="topbar">
    <a class="brand" href="/" aria-label="Meridian home">
      <span class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="12.5" stroke="currentColor" stroke-width="2.4"/>
          <ellipse cx="16" cy="16" rx="5" ry="12.5" stroke="currentColor" stroke-width="2.4"/>
          <line x1="3.5" y1="16" x2="28.5" y2="16" stroke="currentColor" stroke-width="2.4"/>
          <circle cx="16" cy="16" r="2.6" fill="currentColor"/>
        </svg>
      </span>
      <span class="brand-name">Meridian</span>
    </a>

    <div class="topbar-right">
      <span class="live" id="live" title="Auto-updating">
        <span class="live-dot"></span><span class="live-label">LIVE</span>
      </span>
      <form class="search" id="search" role="search">
        <input id="search-input" type="search" placeholder="Search stories…" aria-label="Search stories" autocomplete="off" />
      </form>
      <button class="icon-btn" id="refresh" aria-label="Refresh stories" title="Refresh">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>
        </svg>
      </button>
      <button class="btn-ghost" id="install" hidden>Install</button>
    </div>
  </header>

  <div class="ticker" id="ticker" aria-label="Live markets" title="Markets — delayed quotes">
    <div class="ticker-track" id="ticker-track"></div>
  </div>

  <nav class="tabs" id="tabs" aria-label="Categories">
    <button class="tab is-active" data-cat="top">Top</button>
    <button class="tab" data-cat="world">World</button>
    <button class="tab" data-cat="business">Business</button>
    <button class="tab" data-cat="technology">Technology</button>
    <button class="tab" data-cat="science">Science</button>
    <button class="tab" data-cat="health">Health</button>
    <button class="tab" data-cat="sports">Sports</button>
    <button class="tab" data-cat="entertainment">Culture</button>
    <button class="tab" data-cat="saved">Saved</button>
    <button class="tab tab-markets" data-view="markets">Markets</button>
  </nav>

  <div class="tab-peek" id="tab-peek" hidden aria-hidden="true"></div>

  <section class="curators" id="curators" aria-label="Today's picks from our desk">
    <div class="curators-head">
      <h2>The Desk</h2>
      <span class="curators-sub">Four minds, four picks — refreshed with the feed</span>
    </div>
    <div class="curators-row" id="curators-row"><!-- rendered --></div>
  </section>

  <section class="markets-view" id="markets-view" hidden aria-label="Market analysis">
    <div class="mkt-head">
      <div>
        <h1 class="stage-title">Markets</h1>
        <span class="mkt-sub" id="mkt-updated">Live trends · quotes may be delayed</span>
      </div>
      <form class="mkt-search" id="mkt-search" role="search" autocomplete="off">
        <input id="mkt-search-input" type="search" placeholder="Search any ticker — AAPL, BTC-USD…" aria-label="Search tickers" />
        <div class="mkt-results" id="mkt-results" hidden></div>
      </form>
    </div>

    <div class="mkt-detail" id="mkt-detail">
      <div class="mkt-detail-head">
        <div>
          <div class="mkt-detail-name" id="mkt-detail-name">S&amp;P 500</div>
          <div class="mkt-detail-quote"><span id="mkt-detail-price">—</span> <span id="mkt-detail-chg" class="chg flat">·</span></div>
        </div>
        <div class="mkt-ranges" id="mkt-ranges" aria-label="Chart range">
          <button class="rng is-active" data-range="1d">1D</button>
          <button class="rng" data-range="5d">5D</button>
          <button class="rng" data-range="1mo">1M</button>
          <button class="rng" data-range="6mo">6M</button>
          <button class="rng" data-range="1y">1Y</button>
        </div>
      </div>
      <div class="mkt-chart-wrap" id="mkt-chart-wrap">
        <canvas id="mkt-chart"></canvas>
        <div class="mkt-tip" id="mkt-tip" hidden></div>
      </div>
    </div>

    <div class="mkt-movers" id="mkt-movers"><!-- rendered --></div>

    <div class="mkt-filters" id="mkt-filters" aria-label="Instrument type">
      <button class="rng is-active" data-kind="all">All</button>
      <button class="rng" data-kind="index">Indices</button>
      <button class="rng" data-kind="stock">Stocks</button>
      <button class="rng" data-kind="crypto">Crypto</button>
      <button class="rng" data-kind="commodity">Commodities</button>
      <button class="rng" data-kind="fx">FX</button>
    </div>

    <div class="mkt-grid" id="mkt-grid"><!-- rendered --></div>
  </section>

  <main id="main">
    <section class="stage" aria-live="polite">
      <div class="stage-head">
        <h1 class="stage-title" id="stage-title">Top stories</h1>
        <span class="updated" id="updated"></span>
      </div>
      <div id="feed" class="feed"><!-- rendered --></div>
    </section>

    <aside class="rail" aria-label="On this day in history">
      <div class="rail-head">
        <h2>On this day</h2>
        <span class="rail-sub" id="rail-date"></span>
      </div>
      <div class="rail-tabs" id="rail-tabs" aria-label="History strand">
        <button class="rtab is-active" data-type="events">Events</button>
        <button class="rtab" data-type="births">Births</button>
        <button class="rtab" data-type="deaths">Deaths</button>
      </div>
      <ol id="history" class="history"><!-- rendered --></ol>
    </aside>
  </main>

  <footer class="foot">
    <span class="foot-sig">A Thingy by <a href="https://github.com/andringodson" target="_blank" rel="noopener">Andrin Godson</a></span>
    <span>News via public RSS · History via Wikipedia</span>
  </footer>

  <button class="to-top" id="to-top" aria-label="Back to top" hidden>
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5"/><path d="M5 12l7-7 7 7"/></svg>
  </button>

  <script src="/fluid.js" defer></script>
  <script src="/app.js" defer></script>
</body>
</html>
